    <script type="module">
      (function () {
        // prettier-ignore
        class PlotSVGParser {
  constructor(svg, tooltip, tooltip_x_shift, tooltip_y_shift) {
    this.svg = svg;
    this.tooltip = tooltip;
    this.tooltip_x_shift = tooltip_x_shift;
    this.tooltip_y_shift = tooltip_y_shift;
  }

  findBars(svg, axes_class) {
    const bars = svg.selectAll(`g#${axes_class} g[id^="PolyCollection_"] path`);

    bars.attr("class", "bar plot-element");
    return bars;
  }

  findPoints(svg, axes_class, tooltip_groups) {
    const points = svg.selectAll(
      `g#${axes_class} g[id^="PathCollection"] path`,
    );

    points.each(function (_, i) {
      d3.select(this).attr("data-group", tooltip_groups[i]);
    });
    points.attr("class", "point plot-element");
    return points;
  }

  findLines(svg, axes_class) {
    const lines = svg
      .selectAll(`g#${axes_class} g[id^="line2d"] path`)
      .filter(function () {
        return !this.closest('g[id^="matplotlib.axis"]');
      });

    lines.attr("class", "line plot-element");
    return lines;
  }

  findAreas(svg, axes_class) {
    const areas = svg.selectAll(
      `g#${axes_class} g[id^="FillBetweenPolyCollection"] path`,
    );
    areas.attr("class", "area plot-element");
    return areas;
  }

  getSvgSummary(svg, axes_config) {
    const axes_nodes = svg.selectAll('g[id^="axes_"]').nodes();
    const plot_area_ids = axes_nodes.map((node) => node.id);
    const configured_plot_area_ids = Object.keys(axes_config || {});
    const unconfigured_plot_area_ids = plot_area_ids.filter((id) => {
      return !configured_plot_area_ids.includes(id);
    });
    const dimensions =
      [svg.attr("width"), svg.attr("height")].filter(Boolean).join(" x ") ||
      "unknown size";

    const legend_count = svg.selectAll('g[id^="legend_"]').size();
    const summary_parts = [
      `SVG ${dimensions};`,
      `Found ${this._formatCount(plot_area_ids.length, "plot area")} ${this._formatIds(plot_area_ids)} and ${this._formatCount(legend_count, "legend")}.`,
      `Will process ${this._formatCount(configured_plot_area_ids.length, "plot area")} ${this._formatIds(configured_plot_area_ids)}.`,
    ];

    if (unconfigured_plot_area_ids.length > 0) {
      summary_parts.push(
        `Will ignore ${this._formatCount(unconfigured_plot_area_ids.length, "unconfigured plot area")} ${this._formatIds(unconfigured_plot_area_ids)}.`,
      );
    }

    return summary_parts.join(" ");
  }

  getAxesSummary(svg, axes_class, plot_elements) {
    const axis_groups = svg.selectAll(
      `g#${axes_class} g[id^="matplotlib.axis"]`,
    );

    return {
      axesClass: axes_class,
      plotElements: {
        points: this._selectionSize(plot_elements.points),
        lines: this._selectionSize(plot_elements.lines),
        bars: this._selectionSize(plot_elements.bars),
        areas: this._selectionSize(plot_elements.areas),
      },
    };
  }

  logParseSummary(svg_summary, axes_summaries) {
    if (typeof console === "undefined") {
      return;
    }

    if (typeof console.groupCollapsed === "function") {
      console.groupCollapsed("[ninejs] parsed chart");
    } else {
      console.log("[ninejs] parsed chart");
    }

    console.log(`[ninejs] ${svg_summary}`);

    const table_rows = axes_summaries.map((summary) => {
      return {
        axes: summary.axesClass,
        points: summary.plotElements.points,
        lines: summary.plotElements.lines,
        bars: summary.plotElements.bars,
        areas: summary.plotElements.areas,
      };
    });

    if (typeof console.table === "function") {
      console.table(table_rows);
    } else {
      console.log("[ninejs] axes summary", table_rows);
    }

    if (typeof console.groupEnd === "function") {
      console.groupEnd();
    }
  }

  _selectionSize(selection) {
    if (!selection || typeof selection.size !== "function") {
      return 0;
    }

    return selection.size();
  }

  _formatCount(count, noun) {
    if (count === 1) {
      return `1 ${noun}`;
    }

    return `${count} ${noun}s`;
  }

  _formatIds(ids) {
    if (ids.length === 0) {
      return "(none)";
    }

    return `(${ids.join(", ")})`;
  }

  setHoverEffect(plot_element, tooltip_labels, tooltip_groups, show_tooltip) {
    const self = this;
    plot_element
      .on("mouseover", function (event, d) {
        const nodes = plot_element.nodes();
        let i = nodes.indexOf(this);

        const hovered_group = tooltip_groups[i];
        plot_element.classed("not-hovered", true);
        plot_element
          .filter((_, j) => {
            return tooltip_groups[j] === hovered_group;
          })
          .classed("not-hovered", false)
          .classed("hovered", true);

        self.tooltip
          .style("display", show_tooltip)
          .style("left", event.pageX + self.tooltip_x_shift + "px")
          .style("top", event.pageY + self.tooltip_y_shift + "px")
          .html(tooltip_labels[i]);
      })
      .on("mouseout", function () {
        plot_element.classed("not-hovered", false).classed("hovered", false);
        self.tooltip.style("display", "none");
      });
  }
}

        const tooltip_x_shift = plot_data["tooltip_x_shift"];

        const plotParser = new PlotSVGParser(

        for (const axes_class in axes) {

            const axe_data = axes[axes_class];
            const tooltip_labels = axe_data["tooltip_labels"];
            const tooltip_groups = axe_data["tooltip_groups"];
            const points_data = axe_data["points"] || {};
            const lines_data = axe_data["lines"] || {};
            const bars_data = axe_data["bars"] || {};
            const areas_data = axe_data["areas"] || {};

            const points_labels =
              points_data["tooltip_labels"] || tooltip_labels;
            const points_groups =
              points_data["tooltip_groups"] || tooltip_groups;
            const lines_labels = lines_data["tooltip_labels"] || tooltip_labels;
            const lines_groups = lines_data["tooltip_groups"] || tooltip_groups;
            const bars_labels = bars_data["tooltip_labels"] || tooltip_labels;
            const bars_groups = bars_data["tooltip_groups"] || tooltip_groups;
            const areas_labels = areas_data["tooltip_labels"] || tooltip_labels;
            const areas_groups = areas_data["tooltip_groups"] || tooltip_groups;

            // Find plot elements within this specific axes
            const lines = plotParser.findLines(svg, axes_class);
            const bars = plotParser.findBars(svg, axes_class);
            const points = plotParser.findPoints(
              svg,
              axes_class,
              points_groups,
            );
            const areas = plotParser.findAreas(svg, axes_class);
            axes_summaries.push(
              plotParser.getAxesSummary(
                svg,
                axes_class,
                { points: points, lines: lines, bars: bars, areas: areas },
              ),

            // Apply hover effects only to elements in this axes
            plotParser.setHoverEffect(

              points_groups,
              points_labels.length === 0 ? "none" : "block",
            );
            plotParser.setHoverEffect(

              lines_labels,
              lines_groups,
              lines_labels.length === 0 ? "none" : "block",
            );
            plotParser.setHoverEffect(
              bars,
              bars_labels,

            );
            plotParser.setHoverEffect(
              areas,
              areas_labels,
              areas_groups,
              areas_labels.length === 0 ? "none" : "block",
            );
          }
        }

        plotParser.logParseSummary(svg_summary, axes_summaries);
      })();
