name: "Marimo script"

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install the project
        run: uv sync --all-groups

      - name: Run marimo integration test
        run: |
          uv run marimo check tests/test-integration/script-marimo.py
          uv run pytest tests/test-integration/test_marimo.py -v
