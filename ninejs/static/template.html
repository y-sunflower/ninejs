<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      {{ default_css | safe }}
      {{ additional_css | safe }}
    </style>
  </head>
  <body>
    <!-- Main tag that contains the entire plot and related tags -->
    <div id="plot-container">
      {{ svg | safe }}

      <!-- Placeholder for the tooltip -->
      <div class="tooltip" id="tooltip"></div>
    </div>

    <script id="plot-data" type="application/json">
      {{ plot_data_json | tojson }}
    </script>

    <script>
      // prettier-ignore
      {{ dompurify | safe }}
    </script>
    <script>
      // prettier-ignore
      {{ d3 | safe }}
    </script>

    {% if click_handler_javascript %}
    <script>
      // prettier-ignore
      {{ click_handler_javascript | safe }}
    </script>
    {% endif %}

    <script type="module">
      (function () {
        const d3 = globalThis.d3;

        // prettier-ignore
        {{ js_parser | safe }}

        const container = document.getElementById("plot-container");

        const tooltip = d3.select("#tooltip");
        const svg = d3.select(container).select("svg");

        const plot_data = JSON.parse(
          document.getElementById("plot-data").textContent,
        );
        const hover_nearest = plot_data["hover_nearest"] || false;
        const reverse_hover = plot_data["reverse_hover"] || false;
        const axes = plot_data["axes"];

        const plotParser = new PlotSVGParser(svg, tooltip);
        const svg_summary = plotParser.getSvgSummary(svg, axes);
        const axes_summaries = [];

        // Process each axes that has tooltip configuration
        for (const axes_class in axes) {
          if (axes.hasOwnProperty(axes_class)) {
            const axe_data = axes[axes_class];
            const tooltip_labels = axe_data["tooltip_labels"];
            const tooltip_groups = axe_data["tooltip_groups"];
            const click_handlers = axe_data["click_handlers"] || [];
            const points_data = axe_data["points"] || {};
            const lines_data = axe_data["lines"] || {};
            const bars_data = axe_data["bars"] || {};
            const areas_data = axe_data["areas"] || {};
            const polygons_data = axe_data["polygons"] || {};

            const points_labels =
              points_data["tooltip_labels"] || tooltip_labels;
            const points_groups =
              points_data["tooltip_groups"] || tooltip_groups;
            const points_click_handlers =
              points_data["click_handlers"] || click_handlers;
            const lines_labels = lines_data["tooltip_labels"] || tooltip_labels;
            const lines_groups = lines_data["tooltip_groups"] || tooltip_groups;
            const lines_click_handlers =
              lines_data["click_handlers"] || click_handlers;
            const bars_labels = bars_data["tooltip_labels"] || tooltip_labels;
            const bars_groups = bars_data["tooltip_groups"] || tooltip_groups;
            const bars_click_handlers =
              bars_data["click_handlers"] || click_handlers;
            const areas_labels = areas_data["tooltip_labels"] || tooltip_labels;
            const areas_groups = areas_data["tooltip_groups"] || tooltip_groups;
            const areas_click_handlers =
              areas_data["click_handlers"] || click_handlers;
            const polygons_labels =
              polygons_data["tooltip_labels"] || tooltip_labels;
            const polygons_groups =
              polygons_data["tooltip_groups"] || tooltip_groups;
            const polygons_click_handlers =
              polygons_data["click_handlers"] || click_handlers;

            // Find plot elements within this specific axes
            const lines = plotParser.findLines(svg, axes_class);
            const bars = plotParser.findBars(svg, axes_class, bars_groups);
            const points = plotParser.findPoints(
              svg,
              axes_class,
              points_groups,
            );
            const areas = plotParser.findAreas(svg, axes_class);
            const polygons = plotParser.findPolygons(svg, axes_class);
            axes_summaries.push(
              plotParser.getAxesSummary(axes_class, {
                points: points,
                lines: lines,
                bars: bars,
                areas: areas,
                polygons: polygons,
              }),
            );

            const hover_configs = [
              {
                plotElements: points,
                tooltipLabels: points_labels,
                tooltipGroups: points_groups,
                clickHandlers: points_click_handlers,
                showTooltip: points_labels.length === 0 ? "none" : "block",
                reverseHover: reverse_hover,
              },
              {
                plotElements: lines,
                tooltipLabels: lines_labels,
                tooltipGroups: lines_groups,
                clickHandlers: lines_click_handlers,
                showTooltip: lines_labels.length === 0 ? "none" : "block",
                reverseHover: reverse_hover,
              },
              {
                plotElements: bars,
                tooltipLabels: bars_labels,
                tooltipGroups: bars_groups,
                clickHandlers: bars_click_handlers,
                showTooltip: bars_labels.length === 0 ? "none" : "block",
                reverseHover: reverse_hover,
              },
              {
                plotElements: areas,
                tooltipLabels: areas_labels,
                tooltipGroups: areas_groups,
                clickHandlers: areas_click_handlers,
                showTooltip: areas_labels.length === 0 ? "none" : "block",
                reverseHover: reverse_hover,
              },
              {
                plotElements: polygons,
                tooltipLabels: polygons_labels,
                tooltipGroups: polygons_groups,
                clickHandlers: polygons_click_handlers,
                showTooltip: polygons_labels.length === 0 ? "none" : "block",
                reverseHover: reverse_hover,
              },
            ];

            if (hover_nearest) {
              for (const hover_config of hover_configs) {
                plotParser.setClickEffect(
                  hover_config.plotElements,
                  hover_config.clickHandlers,
                );
              }
              plotParser.setNearestHoverEffect(svg, axes_class, hover_configs);
            } else {
              // Apply hover effects only to elements in this axes
              for (const hover_config of hover_configs) {
                plotParser.setHoverEffect(
                  hover_config.plotElements,
                  hover_config.tooltipLabels,
                  hover_config.tooltipGroups,
                  hover_config.showTooltip,
                  hover_config.reverseHover,
                  hover_config.clickHandlers,
                );
              }
            }
          }
        }

        plotParser.logParseSummary(svg_summary, axes_summaries);
      })();
    </script>

    <script type="module">
      // prettier-ignore
      {{ additional_javascript | safe }}
    </script>
  </body>
</html>
