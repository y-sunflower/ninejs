<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      {{ default_css | safe }}
      {{ additional_css | safe }}
    </style>
  </head>
  <body>
    {% set chart_id = "plot-container-" + uuid %}

    <div id="{{ chart_id }}">
      {{ svg | safe }}
      <div class="tooltip" id="tooltip-{{ uuid }}"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <script type="module">
      (function () {
        // prettier-ignore
        {{ js_parser | safe }}

        const container = document.getElementById("{{ chart_id }}");

        const tooltip = d3.select("#tooltip-{{ uuid }}");
        const svg = d3.select(container).select("svg");

        const plot_data = JSON.parse(`{{ plot_data_json | tojson | safe }}`);
        const tooltip_x_shift = plot_data["tooltip_x_shift"];
        const tooltip_y_shift = -plot_data["tooltip_y_shift"];
        const axes = plot_data["axes"];

        const plotParser = new PlotSVGParser(
          svg,
          tooltip,
          tooltip_x_shift,
          tooltip_y_shift,
        );

        // Process each axes that has tooltip configuration
        for (const axes_class in axes) {
          if (axes.hasOwnProperty(axes_class)) {
            const axe_data = axes[axes_class];
            const tooltip_labels = axe_data["tooltip_labels"];
            const tooltip_groups = axe_data["tooltip_groups"];
            const points_data = axe_data["points"] || {};
            const lines_data = axe_data["lines"] || {};
            const bars_data = axe_data["bars"] || {};
            const areas_data = axe_data["areas"] || {};

            const points_labels =
              points_data["tooltip_labels"] || tooltip_labels;
            const points_groups =
              points_data["tooltip_groups"] || tooltip_groups;
            const lines_labels = lines_data["tooltip_labels"] || tooltip_labels;
            const lines_groups = lines_data["tooltip_groups"] || tooltip_groups;
            const bars_labels = bars_data["tooltip_labels"] || tooltip_labels;
            const bars_groups = bars_data["tooltip_groups"] || tooltip_groups;
            const areas_labels = areas_data["tooltip_labels"] || tooltip_labels;
            const areas_groups = areas_data["tooltip_groups"] || tooltip_groups;

            // Find plot elements within this specific axes
            const lines = plotParser.findLines(svg, axes_class);
            const bars = plotParser.findBars(svg, axes_class);
            const points = plotParser.findPoints(
              svg,
              axes_class,
              points_groups,
            );
            const areas = plotParser.findAreas(svg, axes_class);

            // Apply hover effects only to elements in this axes
            plotParser.setHoverEffect(
              points,
              points_labels,
              points_groups,
              points_labels.length === 0 ? "none" : "block",
            );
            plotParser.setHoverEffect(
              lines,
              lines_labels,
              lines_groups,
              lines_labels.length === 0 ? "none" : "block",
            );
            plotParser.setHoverEffect(
              bars,
              bars_labels,
              bars_groups,
              bars_labels.length === 0 ? "none" : "block",
            );
            plotParser.setHoverEffect(
              areas,
              areas_labels,
              areas_groups,
              areas_labels.length === 0 ? "none" : "block",
            );
          }
        }
      })();
    </script>

    <script type="module">
      // prettier-ignore
      {{ additional_javascript | safe }}
    </script>
  </body>
</html>
